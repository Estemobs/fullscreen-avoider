name: Update GNOME shell-version

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-shell-version:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Update shell-version from GNOME releases
        run: bash .github/scripts/update-shell-version.sh

      - name: Commit and push to master
        run: |
          if git diff --quiet -- src/metadata.json; then
            echo "No shell-version change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/metadata.json
          git commit -m "chore: update GNOME shell-version"
          git push origin HEAD:master
