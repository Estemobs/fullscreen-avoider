name: Update GNOME shell-version

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-shell-version:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Update shell-version from GNOME releases
        run: bash .github/scripts/update-shell-version.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update GNOME shell-version"
          branch: chore/update-shell-version
          title: "chore: update GNOME shell-version"
          body: "Automated update of shell-version from the latest GNOME Shell release metadata."
